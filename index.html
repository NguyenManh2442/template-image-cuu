<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Template Quảng Cáo - G.A.O</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Be+Vietnam+Pro:ital,wght@0,400;0,600;0,700;0,800;1,500&family=Fredoka:wght@500;600;700&family=Pacifico&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<script defer src="https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js"></script>
</head>
<body>
  <div class="page">
    <!-- Bảng điều khiển -->
    <aside class="control-panel">
      <h2>Tùy chỉnh Template</h2>

      <div class="control-group">
        <label>Logo</label>
        <input type="file" id="logoInput" accept="image/*" />
      </div>

      <div class="control-group">
        <label>Ảnh sản phẩm chính</label>
        <input type="file" id="mainImageInput" accept="image/*" />
      </div>

      <div class="control-group">
        <label>Ảnh cutout (bên trái)</label>
        <input type="file" id="cutoutImageInput" accept="image/*" />
      </div>

      <div class="control-group">
        <label>Cân nặng / Số đo</label>
        <input type="text" id="weightInput" value="6 - 25Kg" />
      </div>

      <div class="control-group">
        <label>Voucher 1 - Tiêu đề</label>
        <input type="text" id="voucher1Title" value="VOUCHER MỞ BÁN" />
      </div>

      <div class="control-group">
        <label>Voucher 1 - Giá trị</label>
        <input type="text" id="voucher1Value" value="30K" />
      </div>

      <div class="control-group">
        <label>Voucher 2 - Tiêu đề</label>
        <input type="text" id="voucher2Title" value="VOUCHER MUA 2 SP" />
      </div>

      <div class="control-group">
        <label>Voucher 2 - Giá trị</label>
        <input type="text" id="voucher2Value" value="65K" />
      </div>

      <div class="control-group">
        <label>Badge bên phải (dòng 1)</label>
        <input type="text" id="badgeLine1" value="100%" />
      </div>

      <div class="control-group">
        <label>Badge bên phải (dòng 2)</label>
        <input type="text" id="badgeLine2" value="Ảnh thật" />
      </div>

      <h3>Tone màu</h3>
      <div class="control-group">
        <label>Màu nền chính</label>
        <input type="color" id="colorBg" value="#ffd9e6" />
      </div>

      <div class="control-group">
        <label>Màu nhấn (viền, badge)</label>
        <input type="color" id="colorAccent" value="#ff8fb1" />
      </div>

      <div class="control-group">
        <label>Màu chữ chính</label>
        <input type="color" id="colorText" value="#e91e63" />
      </div>

      <h3>Preset Tone Màu</h3>
      <div class="preset-row">
        <button class="preset" data-bg="#ffd9e6" data-bg2="#ffeef5" data-accent="#ff8fb1" data-text="#e91e63" data-sun="#fcd34d" style="background:linear-gradient(135deg,#ffd9e6,#ff8fb1)"></button>
        <button class="preset" data-bg="#d9ecff" data-bg2="#eaf5ff" data-accent="#7eb8ff" data-text="#1e3a8a" data-sun="#fbbf24" style="background:linear-gradient(135deg,#d9ecff,#7eb8ff)"></button>
        <button class="preset" data-bg="#d4f5e0" data-bg2="#eafff1" data-accent="#7cd9a0" data-text="#166534" data-sun="#fbbf24" style="background:linear-gradient(135deg,#d4f5e0,#7cd9a0)"></button>
        <button class="preset" data-bg="#fff2cc" data-bg2="#fff8e0" data-accent="#ffd966" data-text="#b45309" data-sun="#f97316" style="background:linear-gradient(135deg,#fff2cc,#ffd966)"></button>
        <button class="preset" data-bg="#ebe0ff" data-bg2="#f4ecff" data-accent="#b594ff" data-text="#5b21b6" data-sun="#fbbf24" style="background:linear-gradient(135deg,#ebe0ff,#b594ff)"></button>
        <button class="preset" data-bg="#ffe0e0" data-bg2="#ffeded" data-accent="#ff8585" data-text="#991b1b" data-sun="#fbbf24" style="background:linear-gradient(135deg,#ffe0e0,#ff8585)"></button>
        <button class="preset" data-bg="#e0fbff" data-bg2="#effdff" data-accent="#7dd8ec" data-text="#0e7490" data-sun="#fbbf24" style="background:linear-gradient(135deg,#e0fbff,#7dd8ec)"></button>
        <button class="preset" data-bg="#ffe5d4" data-bg2="#fff0e5" data-accent="#ffae7a" data-text="#c2410c" data-sun="#fbbf24" style="background:linear-gradient(135deg,#ffe5d4,#ffae7a)"></button>
      </div>

      <button id="downloadBtn" class="btn-download">📥 Tải ảnh template (.png)</button>
    </aside>

    <!-- Template -->
    <main class="template-wrap">
      <div class="template" id="template">

        <!-- SVG filter defs for crisp body outline -->
        <svg class="svg-defs" aria-hidden="true" focusable="false">
          <defs>
            <filter id="bodyOutline" x="-10%" y="-10%" width="120%" height="120%">
              <feMorphology in="SourceAlpha" operator="dilate" radius="4" result="dilated"/>
              <feFlood style="flood-color: var(--color-text)" result="flood"/>
              <feComposite in="flood" in2="dilated" operator="in" result="outline"/>
              <feGaussianBlur in="dilated" stdDeviation="0.6" result="blurredDilated"/>
              <feFlood flood-color="rgba(0,0,0,0.25)" result="shadowFlood"/>
              <feComposite in="shadowFlood" in2="blurredDilated" operator="in" result="shadow"/>
              <feOffset in="shadow" dx="0" dy="10" result="shadowOffset"/>
              <feGaussianBlur in="shadowOffset" stdDeviation="6" result="shadowBlur"/>
              <feMerge>
                <feMergeNode in="shadowBlur"/>
                <feMergeNode in="outline"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
        </svg>

        <!-- Background decorations -->
        <div class="bg-deco">
          <span class="dot d1"></span>
          <span class="dot d2"></span>
          <span class="dot d3"></span>
          <span class="dot d4"></span>
          <span class="dot d5"></span>
          <span class="dot d6"></span>
          <span class="dot d7"></span>
          <span class="dot d8"></span>

          <svg class="deco-heart h1" viewBox="0 0 32 32"><path d="M16 28 L4 14 a7 7 0 0 1 12-5 a7 7 0 0 1 12 5 z" fill="currentColor"/></svg>
          <svg class="deco-heart h2" viewBox="0 0 32 32"><path d="M16 28 L4 14 a7 7 0 0 1 12-5 a7 7 0 0 1 12 5 z" fill="currentColor"/></svg>
          <svg class="deco-heart h3" viewBox="0 0 32 32"><path d="M16 28 L4 14 a7 7 0 0 1 12-5 a7 7 0 0 1 12 5 z" fill="currentColor"/></svg>

          <svg class="deco-sparkle s1" viewBox="0 0 24 24"><path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z" fill="currentColor"/></svg>
          <svg class="deco-sparkle s2" viewBox="0 0 24 24"><path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z" fill="currentColor"/></svg>
          <svg class="deco-sparkle s3" viewBox="0 0 24 24"><path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z" fill="currentColor"/></svg>
          <svg class="deco-sparkle s4" viewBox="0 0 24 24"><path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z" fill="currentColor"/></svg>
        </div>

        <!-- Header trên cùng -->
        <div class="top-bar">
          <!-- Logo -->
          <div class="logo-box">
            <img id="logoImg" class="logo-img" src="cuu-shop.png" alt="Cừu Shop" />
          </div>

          <!-- Vouchers -->
          <div class="vouchers">
            <div class="voucher">
              <span class="notch left"></span>
              <span class="notch right"></span>
              <span class="tear-line"></span>
              <div class="voucher-title" id="v1Title">VOUCHER MỞ BÁN</div>
              <div class="voucher-value" id="v1Value">30<small>K</small></div>
              <svg class="mini-sparkle ms1" viewBox="0 0 24 24"><path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z" fill="currentColor"/></svg>
            </div>
            <div class="voucher">
              <span class="notch left"></span>
              <span class="notch right"></span>
              <span class="tear-line"></span>
              <div class="voucher-title" id="v2Title">VOUCHER MUA 2 SP</div>
              <div class="voucher-value" id="v2Value">65<small>K</small></div>
              <svg class="mini-sparkle ms2" viewBox="0 0 24 24"><path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z" fill="currentColor"/></svg>
            </div>
            <div class="badge-real">
              <div class="cam-icon">
                <svg viewBox="0 0 64 64">
                  <rect x="6" y="20" width="52" height="34" rx="8" fill="currentColor"/>
                  <rect x="22" y="11" width="20" height="12" rx="4" fill="currentColor"/>
                  <circle cx="32" cy="37" r="13" fill="#fff"/>
                  <circle cx="32" cy="37" r="9" fill="currentColor" opacity="0.15"/>
                  <path d="M32 30 a7 7 0 1 0 6 4" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/>
                  <circle cx="50" cy="27" r="2" fill="#fff"/>
                  <path d="M36 26 L40 24 L38 30 Z" fill="#ff5f8a"/>
                  <path d="M44 14 l3 -3 M52 18 l4 -1" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
                </svg>
              </div>
              <div class="badge-text">
                <div class="badge-l1" id="badgeL1">100%</div>
                <div class="badge-l2" id="badgeL2">Ảnh thật</div>
              </div>
              <svg class="mini-sparkle ms3" viewBox="0 0 24 24"><path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z" fill="currentColor"/></svg>
            </div>
          </div>
        </div>

        <!-- Main content -->
        <div class="main-content">
          <!-- Cutout -->
          <div class="cutout-col">
            <div class="weight-tag">
              <span class="bag-icon">
                <svg viewBox="0 0 32 32">
                  <path d="M7 12 h18 l-2 17 h-14 z" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
                  <path d="M11 12 v-3 a5 5 0 0 1 10 0 v3" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                  <circle cx="13" cy="17" r="1.2" fill="currentColor"/>
                  <circle cx="19" cy="17" r="1.2" fill="currentColor"/>
                </svg>
              </span>
              <span class="weight-text" id="weightText">6 - 25Kg</span>
              <svg class="tag-heart" viewBox="0 0 32 32"><path d="M16 28 L4 14 a7 7 0 0 1 12-5 a7 7 0 0 1 12 5 z" fill="currentColor"/></svg>
            </div>
            <div class="cutout-image">
              <img id="cutoutImg" src="https://images.unsplash.com/photo-1519689680058-324335c77eba?w=600" alt="cutout" />
            </div>
          </div>

          <!-- Main photo -->
          <div class="main-photo">
            <img id="mainImg" src="https://images.unsplash.com/photo-1519689680058-324335c77eba?w=900" alt="main" />
            <svg class="photo-corner tl" viewBox="0 0 60 60"><path d="M5 30 a25 25 0 0 1 25 -25" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round"/></svg>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
